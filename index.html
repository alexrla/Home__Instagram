<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0 maximun-scale=1, user-scalable=no">
        <title>Instagram</title>
        <link rel="shortcut icon" href="./img/favicon.png">

        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>
        <main class="conteudoPrincipal">
            <div class="conteudoPrincipal__container">
                <!-- Banner lateral -->
                <div class="container__banner">
                    <img src="./img/imagem_cel_exterior.png" alt="Crie uma conta ou realize o login e acesse o Instagram">
                </div>

                <!-- Formulário de login -->
                <div class="container__form">
                    <div class="form__conteudo">
                        <!-- Logo -->
                        <img src="./img/logo_instagram.png" alt="Logo Instagram" class="conteudo__logo">

                        <!-- Formulário de login-->
                        <form action="#" class="conteudo__loginForm">
                            <input type="text" name="username" placeholder="Telefone, nome de usuário ou email">

                            <input type="password" name="password" placeholder="Senha">

                            <input type="submit" value="Entrar">
                        </form>

                        <!-- Separador -->
                        <div class="conteudo__separador">
                            <div class="redesSociais__bordaHorizontal"></div>

                            <span>ou</span>
                        </div>

                        <!-- Redes sociais -->
                        <div class="conteudo__redesSociais">
                            <div class="redesSociais__facebook">
                                <a href="#">
                                    <img src="./img/logo_facebook.svg" alt="Entrar com o Facebook">
                                </a>
                                <span>Entrar com o Facebook</span>
                            </div>

                            <div class="redesSociais__esqueceuSenha">
                                <a href="#">Esqueceu a senha?</a>
                            </div>
                        </div>
                    </div>

                    <div class="form__cadastro">
                        <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                    </div>

                    <div class="form__apps">
                        <p>Obtenha o aplicativo.</p>
                        <a href="#">
                            <img src="./img/botao_apple.png" alt="Apple Sotre">
                        </a>
    
                        <a href="#">
                            <img src="./img/botao_google_play.png" alt="Google Play">
                        </a>
                    </div>
                </div>   
            </div>
        </main>

        <!-- Rodapé -->
        <footer class="rodape">
            <nav>
                <ul class="rodape__links">
                    <li>
                        <a href="#">Sobre</a>
                    </li>

                    <li>
                        <a href="#">Ajuda</a>
                    </li>

                    <li>
                        <a href="#">Imprensa</a>
                    </li>

                    <li>
                        <a href="#">API</a>
                    </li>

                    <li>
                        <a href="#">Carreiras</a>
                    </li>

                    <li>
                        <a href="#">Privacidade</a>
                    </li>

                    <li>
                        <a href="#">Termos</a>
                    </li>

                    <li>
                        <a href="#">Localizações</a>
                    </li>

                    <li>
                        <a href="#">Principais contas</a>
                    </li>

                    <li>
                        <a href="#">Hashtags</a>
                    </li>

                    <li>
                        <a href="#">Idiomas</a>
                    </li>
                </ul>
            </nav>

            <p class="rodape__copyright">
                &copy; 2022 Instagram from Meta
            </p>
        </footer>
    </body>
</html>
